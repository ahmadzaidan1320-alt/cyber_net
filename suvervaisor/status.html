<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Data — Cyber_net</title>
    <!-- CSS dan font seperti sebelumnya -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        /* ...CSS sama seperti sebelumnya (lihat di atas)... */
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3e;
            --accent: #151ed1;
            --danger: #ef5350;
            --success: #66bb6a;
            --warn: #ffa726;
            --text: #e8eaf0;
            --muted: #7c7f8e;
            --radius: 8px;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, rgba(15, 17, 23, 0.85) 0%, rgba(10, 18, 48, 0.9) 40%, rgba(5, 10, 30, 0.95) 100%), url('mario.jpg') center/cover no-repeat fixed;
            color: var(--text);
            font-family: var(--sans);
            font-size: 14px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 60px;
        }

        h1 {
            font-family: var(--mono);
            font-size: 22px;
            margin-bottom: 20px;
            color: var(--accent);
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 12px;
            background: var(--accent);
            color: #111;
            text-decoration: none;
            border-radius: var(--radius);
        }

        a:hover {
            opacity: 0.88;
        }

        /* Style form dan layout sesuai sebelumnya... */
        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-bottom: 6px;
        }

        input[type=text],
        input[type=number],
        input[type=date],
        select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--sans);
            font-size: 14px;
            padding: 10px 12px;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus,
        select:focus {
            border-color: var(--accent);
        }

        .btn {
            padding: 10px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity .15s, transform 0.1s;
            background: var(--accent);
            color: #111;
        }

        .btn:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        /* Container dan card... */
        .container {
            max-width: 640px;
            width: 100%;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .entry-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 8px 12px;
        }

        /* Net display... */
        .net-display {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .net-amount {
            font-family: var(--mono);
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }
    </style>
</head>

<body>
    <h1>Input Data Harian</h1>
    <div class="container">

        <!-- Form input data -->
        <div class="card">
            <h2 class="card-title">📝 Input Data Harian</h2>
            <form id="mainForm">
                <div class="form-group">
                    <label>Tanggal</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label>Lokasi</label>
                    <select id="location" required>
                        <option value="">-- Pilih --</option>
                        <option value="PUSAT">PUSAT</option>
                        <option value="GRAHA">GRAHA</option>
                        <option value="ROXY">ROXY</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Operator (Nama Kamu)</label>
                    <select id="operator" required>
                        <option value="">-- Pilih --</option>
                        <option value="Andika">Andika</option>
                        <option value="Doy">Doy</option>
                        <option value="Edoy">Edoy</option>
                        <option value="Fikri">Fikri</option>
                        <option value="Glenn">Glenn</option>
                        <option value="Wawan">Wawan</option>
                        <option value="eki">eki</option>
                        <option value="niko">niko</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Omset Kotor</label>
                    <input type="number" id="sales" min="1" step="1" oninput="calcNet()" required placeholder="0" />
                </div>

                <!-- Fitur tambahan seperti pengeluaran, kasbon, QRIS bisa tetap sama -->
                <!-- ...kode lainnya seperti addExtra, addKasbon, addQris, calcNet sama seperti sebelumnya... -->

                <div class="net-display">
                    <label>Net Cash Diterima</label>
                    <div class="net-amount" id="net-display">Rp 0</div>
                    <input type="hidden" id="net_sales" name="net_sales" value="0" />
                </div>

                <button type="submit" class="btn">🔍 Preview & Konfirmasi</button>
            </form>
        </div>

        <!-- Link untuk menuju halaman melihat data -->
        <a href="kasbon.html" class="btn">💳 Data Kasbon</a>

    </div>

    <script>
        // Simpan data ke localStorage saat form disubmit
        document.getElementById('mainForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const data = {
                tanggal: document.getElementById('date').value,
                lokasi: document.getElementById('location').value,
                operator: document.getElementById('operator').value,
                omset: document.getElementById('sales').value
            };
            const stored = JSON.parse(localStorage.getItem('dataKasbon')) || [];
            stored.push(data);
            localStorage.setItem('dataKasbon', JSON.stringify(stored));
            alert('Data berhasil disimpan!');
            this.reset();
        });

        // Fungsi kalkulasi net (seperti sebelumnya)
        function calcNet() {
            const sales = parseFloat(document.getElementById('sales').value) || 0;
            // hitung pengeluaran, kasbon, qris jika ada, sesuai kode sebelumnya
            // untuk contoh ini, saya biarkan kalkulasi sederhana
            document.getElementById('net-display').textContent = 'Rp ' + sales.toLocaleString('id-ID');
            document.getElementById('net_sales').value = sales;
        }
    </script>

</body>

</html>
